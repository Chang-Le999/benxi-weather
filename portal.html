<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Portal</title>
<style>
*{margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#040612}
canvas{display:block;touch-action:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
var c=document.getElementById('c'),ctx=c.getContext('2d');
var dpr=window.devicePixelRatio||1,W,H;

function resize(){
  W=window.innerWidth;H=window.innerHeight;
  c.width=W*dpr;c.height=H*dpr;
  c.style.width=W+'px';c.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize',resize);resize();

/* ========== 配置 ========== */
var TILT=23*Math.PI/180;   // 自转轴倾斜角
var ROT_PERIOD=50;          // 秒/圈
var rotAngle=0;

// 导航点：lat纬度 lon经度 label标签 url链接 rgb颜色
// ← 在此添加/修改导航点 →
var NAV=[
  {lat:25,lon:40,label:'天气',url:'./index.html',rgb:'79,195,247'},
  {lat:-20,lon:160,label:'待定',url:'',rgb:'171,71,188'},
  {lat:50,lon:260,label:'待定',url:'',rgb:'102,187,106'}
];

/* ========== 星空 ========== */
var stars=[];
for(var i=0;i<450;i++){
  stars.push({
    x:Math.random(),y:Math.random(),
    r:Math.random()*1.4+0.3,
    a:Math.random()*0.4+0.25,
    tw:Math.random()<0.25,
    ph:Math.random()*6.28,
    sp:Math.random()*1.5+0.5
  });
}
var nebs=[
  {x:0.18,y:0.28,r:0.18,c:'30,50,130'},
  {x:0.72,y:0.62,r:0.14,c:'55,22,95'},
  {x:0.48,y:0.82,r:0.11,c:'22,55,105'}
];

/* ========== 球面投影 ========== */
function proj(latD,lonD,cosR,sinR,cosT,sinT,cx,cy,r){
  var lat=latD*Math.PI/180,lon=lonD*Math.PI/180;
  var cl=Math.cos(lat),sl=Math.sin(lat),clo=Math.cos(lon),slo=Math.sin(lon);
  var x=cl*slo,y=sl,z=cl*clo;
  var x2=x*cosR+z*sinR,y2=y,z2=-x*sinR+z*cosR;
  var x3=x2,y3=y2*cosT-z2*sinT,z3=y2*sinT+z2*cosT;
  return{sx:cx+x3*r,sy:cy-y3*r,z:z3,v:z3>0.02};
}

/* ========== 地表色块 ========== */
var PATCHES=[
  {pts:[[10,20],[30,30],[38,55],[22,50],[5,35]],c:'28,75,58'},
  {pts:[[-32,128],[-10,118],[-4,155],[-26,162],[-42,140]],c:'38,68,52'},
  {pts:[[48,218],[62,238],[56,268],[38,256]],c:'32,62,52'},
  {pts:[[-46,298],[-34,284],[-28,318],[-42,326]],c:'42,72,56'},
  {pts:[[5,300],[18,310],[22,340],[8,335]],c:'30,65,50'}
];

/* ========== 绘制 ========== */
function drawBg(t){
  var g=ctx.createRadialGradient(W*0.38,H*0.32,0,W*0.5,H*0.5,Math.max(W,H)*0.88);
  g.addColorStop(0,'#10184a');g.addColorStop(0.35,'#0a0e2a');g.addColorStop(1,'#040612');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  for(var i=0;i<nebs.length;i++){
    var n=nebs[i];
    var ng=ctx.createRadialGradient(n.x*W,n.y*H,0,n.x*W,n.y*H,n.r*Math.max(W,H));
    ng.addColorStop(0,'rgba('+n.c+',0.06)');ng.addColorStop(1,'rgba('+n.c+',0)');
    ctx.fillStyle=ng;ctx.fillRect(0,0,W,H);
  }
  var ts=t/1000;
  for(var i=0;i<stars.length;i++){
    var s=stars[i],a=s.a;
    if(s.tw)a*=0.3+0.7*(0.5+0.5*Math.sin(ts*s.sp+s.ph));
    ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,6.28);
    ctx.fillStyle='rgba(185,205,255,'+a.toFixed(3)+')';ctx.fill();
  }
}

function drawAtmo(cx,cy,r){
  for(var i=3;i>=0;i--){
    var gr=r*(1.12+i*0.08);
    var g=ctx.createRadialGradient(cx,cy,r*0.9,cx,cy,gr);
    g.addColorStop(0,'rgba(45,115,215,'+(0.035+i*0.008)+')');
    g.addColorStop(0.55,'rgba(28,78,175,'+(0.018+i*0.004)+')');
    g.addColorStop(1,'rgba(18,48,145,0)');
    ctx.beginPath();ctx.arc(cx,cy,gr,0,6.28);ctx.fillStyle=g;ctx.fill();
  }
}

function drawPlanet(cx,cy,r,cosR,sinR,cosT,sinT){
  // 球体底色 + 3D 光影
  var g=ctx.createRadialGradient(cx-r*0.32,cy-r*0.32,r*0.04,cx+r*0.1,cy+r*0.1,r);
  g.addColorStop(0,'#2c4e90');g.addColorStop(0.22,'#1f3a74');
  g.addColorStop(0.5,'#15295c');g.addColorStop(0.78,'#0d1b42');g.addColorStop(1,'#07102a');
  ctx.beginPath();ctx.arc(cx,cy,r,0,6.28);ctx.fillStyle=g;ctx.fill();

  // 地表色块
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,r-0.5,0,6.28);ctx.clip();
  for(var pi=0;pi<PATCHES.length;pi++){
    var p=PATCHES[pi];ctx.beginPath();var st=false;
    for(var j=0;j<p.pts.length;j++){
      var pp=proj(p.pts[j][0],p.pts[j][1],cosR,sinR,cosT,sinT,cx,cy,r);
      if(!pp.v){st=false;continue}
      if(!st){ctx.moveTo(pp.sx,pp.sy);st=true}else ctx.lineTo(pp.sx,pp.sy);
    }
    ctx.closePath();ctx.fillStyle='rgba('+p.c+',0.18)';ctx.fill();
  }
  ctx.restore();

  // 经纬线（双层：辉光+锐线）
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,r-0.5,0,6.28);ctx.clip();
  ctx.strokeStyle='rgba(65,145,255,0.05)';ctx.lineWidth=2.5;
  drawGrid(cx,cy,r,cosR,sinR,cosT,sinT);
  ctx.strokeStyle='rgba(65,145,255,0.09)';ctx.lineWidth=0.6;
  drawGrid(cx,cy,r,cosR,sinR,cosT,sinT);
  ctx.restore();

  // 高光
  var sg=ctx.createRadialGradient(cx-r*0.36,cy-r*0.36,0,cx-r*0.36,cy-r*0.36,r*0.48);
  sg.addColorStop(0,'rgba(145,195,255,0.07)');sg.addColorStop(1,'rgba(100,150,255,0)');
  ctx.beginPath();ctx.arc(cx,cy,r,0,6.28);ctx.fillStyle=sg;ctx.fill();
}

function drawGrid(cx,cy,r,cosR,sinR,cosT,sinT){
  for(var lon=0;lon<360;lon+=30){
    ctx.beginPath();var st=false;
    for(var lat=-90;lat<=90;lat+=3){
      var p=proj(lat,lon,cosR,sinR,cosT,sinT,cx,cy,r);
      if(!p.v){st=false;continue}
      if(!st){ctx.moveTo(p.sx,p.sy);st=true}else ctx.lineTo(p.sx,p.sy);
    }
    ctx.stroke();
  }
  for(var lat=-60;lat<=60;lat+=30){
    ctx.beginPath();var st=false;
    for(var lon=0;lon<=360;lon+=3){
      var p=proj(lat,lon,cosR,sinR,cosT,sinT,cx,cy,r);
      if(!p.v){st=false;continue}
      if(!st){ctx.moveTo(p.sx,p.sy);st=true}else ctx.lineTo(p.sx,p.sy);
    }
    ctx.stroke();
  }
}

var visNav=[];

function drawNav(cx,cy,r,cosR,sinR,cosT,sinT,t){
  visNav=[];
  var ts=t/1000;
  for(var i=0;i<NAV.length;i++){
    var n=NAV[i];
    var p=proj(n.lat,n.lon,cosR,sinR,cosT,sinT,cx,cy,r);
    if(!p.v)continue;
    var ds=0.45+0.55*p.z;
    var dr=Math.max(4*ds,3)+2;
    var pulse=0.75+0.25*Math.sin(ts*2.2+i*2.1);

    // 外圈辉光
    var gg=ctx.createRadialGradient(p.sx,p.sy,0,p.sx,p.sy,dr*4.5);
    gg.addColorStop(0,'rgba('+n.rgb+','+(0.28*pulse).toFixed(3)+')');
    gg.addColorStop(0.45,'rgba('+n.rgb+','+(0.08*pulse).toFixed(3)+')');
    gg.addColorStop(1,'rgba('+n.rgb+',0)');
    ctx.beginPath();ctx.arc(p.sx,p.sy,dr*4.5,0,6.28);ctx.fillStyle=gg;ctx.fill();

    // 圆点
    ctx.beginPath();ctx.arc(p.sx,p.sy,dr,0,6.28);
    ctx.fillStyle='rgba('+n.rgb+','+(0.65+0.35*pulse).toFixed(3)+')';ctx.fill();

    // 中心白点
    ctx.beginPath();ctx.arc(p.sx,p.sy,dr*0.35,0,6.28);
    ctx.fillStyle='rgba(255,255,255,'+(0.45*pulse).toFixed(3)+')';ctx.fill();

    // 标签
    var la=Math.min(1,Math.max(0,(p.z-0.08)*2.8));
    if(la>0.05){
      ctx.font=(11*ds).toFixed(0)+'px -apple-system,BlinkMacSystemFont,sans-serif';
      ctx.textAlign='center';
      ctx.fillStyle='rgba(200,220,255,'+la.toFixed(3)+')';
      ctx.fillText(n.label,p.sx,p.sy-dr-5*ds);
    }

    visNav.push({sx:p.sx,sy:p.sy,r:Math.max(dr*2.5,22),url:n.url});
  }
}

/* ========== 交互 ========== */
function handlePtr(x,y){
  for(var i=0;i<visNav.length;i++){
    var n=visNav[i];
    if(n.url&&(x-n.sx)*(x-n.sx)+(y-n.sy)*(y-n.sy)<n.r*n.r){
      window.location.href=n.url;return;
    }
  }
}
c.addEventListener('click',function(e){handlePtr(e.clientX,e.clientY)});
c.addEventListener('mousemove',function(e){
  var over=false;
  for(var i=0;i<visNav.length;i++){
    var n=visNav[i];
    if(n.url&&(e.clientX-n.sx)*(e.clientX-n.sx)+(e.clientY-n.sy)*(e.clientY-n.sy)<n.r*n.r){
      over=true;break;
    }
  }
  c.style.cursor=over?'pointer':'default';
});

/* ========== 动画主循环 ========== */
var last=0;
function frame(t){
  var dt=last?(t-last)/1000:0;last=t;
  rotAngle+=6.2832/ROT_PERIOD*dt;

  var pr=Math.min(W,H)*0.33;
  if(pr<110)pr=110;
  var pcx=W/2,pcy=H/2;
  var cosR=Math.cos(rotAngle),sinR=Math.sin(rotAngle);
  var cosT=Math.cos(TILT),sinT=Math.sin(TILT);

  ctx.clearRect(0,0,W,H);
  drawBg(t);
  drawAtmo(pcx,pcy,pr);
  drawPlanet(pcx,pcy,pr,cosR,sinR,cosT,sinT);
  drawNav(pcx,pcy,pr,cosR,sinR,cosT,sinT,t);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
})();
</script>
</body>
</html>

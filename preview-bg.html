<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>12种天气整体效果预览</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;color:#fff;background:#111;padding:8px}
h1{font-size:.8em;text-align:center;opacity:.4;margin-bottom:8px;font-weight:400}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.phone{position:relative;border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,.1)}
.phone-label{position:absolute;top:0;left:0;right:0;z-index:30;text-align:center;font-size:.6em;background:rgba(0,0,0,.5);padding:2px 0;letter-spacing:.5px}

/* each phone is a scaled-down full page */
.page{position:relative;width:100%;padding-bottom:220%;overflow:hidden}
.page .bg{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
.page .fx{position:absolute;top:0;left:0;width:100%;height:100%;z-index:5;overflow:hidden;pointer-events:none}
.page .wrap{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;padding:8% 5% 5%}
.page .wrap .city-bar{font-size:5.5vw;font-weight:600;letter-spacing:.5px;text-align:center;padding:4% 0 1%}
.page .wrap .now{text-align:center;padding:4% 0}
.page .wrap .now .temp{font-size:16vw;font-weight:200;line-height:1}
.page .wrap .now .temp sup{font-size:.3em;vertical-align:super}
.page .wrap .now .desc{font-size:4.5vw;margin-top:1%;opacity:.85}
.page .wrap .now .feel{font-size:3.2vw;margin-top:1%;opacity:.5}
.page .wrap .chart-sec{margin:2% 0 4%;position:relative;z-index:10}
.page .wrap .chart-sec .ct{font-size:3.2vw;opacity:.75;padding:1% 0;display:flex;justify-content:space-between}
.page .wrap .chart-box{background:rgba(40,44,48,.28);border-radius:8px;padding:4%;position:relative;overflow:hidden}
.page .wrap .chart-box .chart-fx{position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;overflow:hidden;pointer-events:none;opacity:0;transition:opacity .4s}
.page .wrap .chart-box .chart-fx.active{opacity:1}
.page .wrap .chart-box .chart-fx .rain-layer i{opacity:.6}
.page .wrap .chart-box .chart-fx .snow-layer i{opacity:.45}
.page .wrap .chart-box canvas{display:block;width:100%;height:16vw;position:relative;z-index:1}
.page .wrap .fc-title{font-size:3vw;opacity:.75;letter-spacing:.5px;margin:2% 0 1%}
.page .wrap .fc{background:rgba(40,44,48,.28);border-radius:8px;padding:2% 4%}
.page .wrap .fc-row{display:grid;grid-template-columns:22% 1fr 14% 16%;align-items:center;padding:2% 0;font-size:3vw;border-bottom:1px solid rgba(255,255,255,.06)}
.page .wrap .fc-row:last-child{border:none}
.page .wrap .fc-row .date{opacity:.7;font-size:2.8vw}
.page .wrap .fc-row .winfo{display:flex;align-items:center;gap:1.5vw}
.page .wrap .fc-row .winfo .icon{font-size:3.5vw}
.page .wrap .fc-row .winfo .wind{font-size:2.5vw;opacity:.4}
.page .wrap .fc-row .lo{text-align:right;opacity:.45}
.page .wrap .fc-row .hi{text-align:right;font-weight:600}
.page .wrap .upt{text-align:center;font-size:2.2vw;opacity:.25;padding:3% 0 0}

/* 12 bg gradients */
.bg.sunny-d{background:linear-gradient(180deg,#4a90d9,#87ceeb,#b8dff5)}
.bg.sunny-n{background:linear-gradient(180deg,#0a0e2a,#141852,#1a1a3e)}
.bg.cloudy{background:linear-gradient(180deg,#4a90d9,#87ceeb,#b8dff5)}
.bg.overcast{background:linear-gradient(180deg,#506070,#7080a0,#90a0b5)}
.bg.rain-l{background:linear-gradient(180deg,#2a3545,#3d5060,#4a6070)}
.bg.rain-m{background:linear-gradient(180deg,#1e2a38,#2e3e50,#3a4a58)}
.bg.rain-h{background:linear-gradient(180deg,#121a25,#1e2a38,#253545)}
.bg.snow-l{background:linear-gradient(180deg,#607080,#8090a0,#a0b0c0)}
.bg.snow-m{background:linear-gradient(180deg,#506070,#7080a0,#90a0b5)}
.bg.snow-h{background:linear-gradient(180deg,#404f60,#5a6a80,#7080a0)}
.bg.fog{background:linear-gradient(180deg,#5a6570,#78858f,#909aa5)}
.bg.dust{background:linear-gradient(180deg,#6a5530,#8a7040,#a09060)}

/* fx */
.stars{position:absolute;width:100%;height:40%;top:0;left:0}
.stars i{position:absolute;background:#fff;border-radius:50%;animation:twinkle 3s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.3}50%{opacity:1}}
.cloud{position:absolute;animation:drift 28s linear infinite}
.cloud .bl{position:absolute;border-radius:50%}
.cloud .b1{width:50px;height:44px;left:26px;top:0;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.cloud .b2{width:58px;height:52px;left:6px;top:10px;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.cloud .b3{width:48px;height:42px;left:48px;top:8px;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.cloud .b4{width:98px;height:32px;left:6px;top:32px;border-radius:32px;background:#f8f8fa;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.cloud-1{top:18%;width:110px;height:64px}
.cloud-2{top:34%;width:110px;height:64px;animation-duration:36s;transform:scale(.56)}
.cloud-2 .b1,.cloud-2 .b2,.cloud-2 .b3{background:rgba(255,255,255,.85)}
.cloud-2 .b4{background:rgba(248,248,250,.8)}
.cloud-3{top:10%;width:110px;height:64px;animation-duration:42s;transform:scale(.4)}
.cloud-3 .b1,.cloud-3 .b2,.cloud-3 .b3{background:rgba(255,255,255,.62)}
.cloud-3 .b4{background:rgba(248,248,250,.58)}
@keyframes drift{from{left:-140px}to{left:calc(100% + 30px)}}
.rain-layer{position:absolute;width:100%;height:100%;top:0;left:0;overflow:hidden}
.rain-layer i{position:absolute;width:1.5px;background:linear-gradient(transparent,rgba(174,200,230,.5));border-radius:0 0 2px 2px;animation:fall linear infinite}
.rain-l .rain-layer i{height:16px;animation-duration:2.5s}
.rain-m .rain-layer i{height:22px;animation-duration:1.5s}
.rain-h .rain-layer i{height:30px;width:2px;animation-duration:1s;background:linear-gradient(transparent,rgba(174,200,230,.7))}
@keyframes fall{from{top:-30px}to{top:100%}}
.lightning{position:absolute;width:100%;height:100%;top:0;left:0;pointer-events:none;animation:flash 4s ease-in-out infinite}
@keyframes flash{0%,90%,100%{opacity:0}92%{opacity:.8}93%{opacity:0}95%{opacity:.5}96%{opacity:0}}
.snow-layer{position:absolute;width:100%;height:100%;top:0;left:0;overflow:hidden}
.snow-layer i{position:absolute;background:rgba(255,255,255,.7);border-radius:50%;animation:snowfall linear infinite}
@keyframes snowfall{from{top:-10px;transform:translateX(0) rotate(0)}to{top:100%;transform:translateX(30px) rotate(360deg)}}
.fog-overlay{position:absolute;width:100%;height:100%;top:0;left:0;background:rgba(200,210,220,.3);animation:fogmove 8s ease-in-out infinite alternate}
@keyframes fogmove{from{opacity:.3}to{opacity:.6}}
.dust-layer{position:absolute;width:100%;height:100%;top:0;left:0;overflow:hidden}
.dust-layer i{position:absolute;width:3px;height:3px;background:rgba(180,150,80,.4);border-radius:50%;animation:dustblow linear infinite}
@keyframes dustblow{from{left:-10px;transform:translateY(0)}to{left:100%;transform:translateY(-40px)}}
</style>
</head>
<body>
<h1>12种天气整体效果</h1>
<div class="grid" id="grid"></div>
<script>
var TYPES=[
  {id:'sunny-d',label:'☀️ 晴(白天)',temp:'26',desc:'☀️ 晴',feel:'体感 28°'},
  {id:'sunny-n',label:'🌙 晴(夜晚)',temp:'18',desc:'🌙 晴',feel:'体感 16°'},
  {id:'cloudy',label:'⛅ 多云',temp:'22',desc:'⛅ 多云',feel:'体感 21°'},
  {id:'overcast',label:'☁️ 阴',temp:'19',desc:'☁️ 阴',feel:'体感 18°'},
  {id:'rain-l',label:'🌦️ 小雨',temp:'16',desc:'🌦️ 小雨',feel:'体感 14°'},
  {id:'rain-m',label:'🌧️ 中雨',temp:'13',desc:'🌧️ 中雨',feel:'体感 11°'},
  {id:'rain-h',label:'⛈️ 大雨',temp:'10',desc:'⛈️ 大雨',feel:'体感 7°'},
  {id:'snow-l',label:'🌨️ 小雪',temp:'2',desc:'🌨️ 小雪',feel:'体感 -1°'},
  {id:'snow-m',label:'❄️ 中雪',temp:'-1',desc:'❄️ 中雪',feel:'体感 -5°'},
  {id:'snow-h',label:'❄️ 大雪',temp:'-4',desc:'❄️ 大雪',feel:'体感 -9°'},
  {id:'fog',label:'🌫️ 雾',temp:'8',desc:'🌫️ 雾',feel:'体感 6°'},
  {id:'dust',label:'🏜️ 沙尘',temp:'20',desc:'🏜️ 扬沙',feel:'体感 17°'}
];

var FC=[
  {label:'今天',wk:'',icon:'🌦️',w:'小雨',wind:'3级',lo:'12°',hi:'22°'},
  {label:'明天',wk:'',icon:'🌧️',w:'中雨',wind:'4级',lo:'10°',hi:'18°'},
  {label:'后天',wk:'',icon:'⛅',w:'多云',wind:'2级',lo:'8°',hi:'20°'},
  {label:'',wk:'周一',icon:'☀️',w:'晴',wind:'2级',lo:'5°',hi:'16°'},
  {label:'',wk:'周二',icon:'⛅',w:'多云',wind:'3级',lo:'8°',hi:'19°'},
  {label:'',wk:'周三',icon:'🌧️',w:'小雨',wind:'3级',lo:'10°',hi:'17°'},
  {label:'',wk:'周四',icon:'☁️',w:'阴',wind:'2级',lo:'9°',hi:'15°'}
];

function makeFx(type,fxEl){
  if(type==='sunny-n'){
    var st=document.createElement('div');st.className='stars';
    for(var i=0;i<40;i++){var si=document.createElement('i');si.style.left=Math.random()*100+'%';si.style.top=Math.random()*100+'%';si.style.animationDelay=Math.random()*3+'s';si.style.animationDuration=(2+Math.random()*3)+'s';var sz=1+Math.random()*2;si.style.width=sz+'px';si.style.height=sz+'px';st.appendChild(si)}
    fxEl.appendChild(st);
  }
  if(type==='cloudy'||type==='overcast'||type==='sunny-d'){
    for(var i=1;i<=3;i++){var c=document.createElement('div');c.className='cloud cloud-'+i;c.style.animationDelay=(-Math.random()*30)+'s';['b1','b2','b3','b4'].forEach(function(b){var el=document.createElement('div');el.className='bl '+b;c.appendChild(el)});fxEl.appendChild(c)}
  }
  if(type==='rain-l'||type==='rain-m'||type==='rain-h'){
    var rl=document.createElement('div');rl.className='rain-layer';
    var n=type==='rain-l'?30:(type==='rain-m'?60:100);
    for(var i=0;i<n;i++){var ri=document.createElement('i');var dur=(0.75+Math.random()*(type==='rain-h'?0.5:1.25));ri.style.left=Math.random()*100+'%';ri.style.animationDuration=dur+'s';ri.style.animationDelay=(-Math.random()*dur)+'s';rl.appendChild(ri)}
    fxEl.appendChild(rl);
    if(type==='rain-h'){var lt=document.createElement('div');lt.className='lightning';lt.style.background='rgba(255,255,255,0)';lt.style.animationDelay=(Math.random()*3)+'s';fxEl.appendChild(lt)}
  }
  if(type==='snow-l'||type==='snow-m'||type==='snow-h'){
    var sl=document.createElement('div');sl.className='snow-layer';
    var n=type==='snow-l'?25:(type==='snow-m'?50:80);
    var szMin=type==='snow-l'?3:(type==='snow-m'?4:5),szMax=type==='snow-l'?5:(type==='snow-m'?7:9);
    var durMin=type==='snow-l'?6:(type==='snow-m'?5:4),durMax=type==='snow-l'?12:(type==='snow-m'?10:8);
    for(var i=0;i<n;i++){var si=document.createElement('i');var dur=(durMin+Math.random()*(durMax-durMin));si.style.left=Math.random()*100+'%';si.style.animationDuration=dur+'s';si.style.animationDelay=(-Math.random()*dur)+'s';var sz=szMin+Math.random()*(szMax-szMin);si.style.width=sz+'px';si.style.height=sz+'px';si.style.opacity=0.4+Math.random()*0.4;sl.appendChild(si)}
    fxEl.appendChild(sl);
  }
  if(type==='fog'){var fo=document.createElement('div');fo.className='fog-overlay';fxEl.appendChild(fo)}
  if(type==='dust'){var dl=document.createElement('div');dl.className='dust-layer';for(var i=0;i<40;i++){var di=document.createElement('i');di.style.top=Math.random()*100+'%';di.style.animationDuration=(2+Math.random()*4)+'s';di.style.animationDelay=Math.random()*3+'s';dl.appendChild(di)}fxEl.appendChild(dl)}
}

function makeChartFx(type,fxEl){
  var cls=type;
  fxEl.className='chart-fx active '+cls;
  if(cls==='cloudy'||cls==='overcast'||cls==='sunny-d'){
    for(var i=1;i<=2;i++){var c=document.createElement('div');c.className='cloud cloud-'+i;c.style.animationDelay=(-Math.random()*30)+'s';['b1','b2','b3','b4'].forEach(function(b){var el=document.createElement('div');el.className='bl '+b;c.appendChild(el)});fxEl.appendChild(c)}
  }
  if(cls==='rain-l'||cls==='rain-m'||cls==='rain-h'){
    var rl=document.createElement('div');rl.className='rain-layer';
    var n=cls==='rain-l'?20:(cls==='rain-m'?40:60);
    var rH=cls==='rain-l'?16:(cls==='rain-m'?22:30);
    var rW=cls==='rain-h'?'2px':'1.5px';
    var rBg=cls==='rain-h'?'linear-gradient(transparent,rgba(174,200,230,.7))':'linear-gradient(transparent,rgba(174,200,230,.5))';
    for(var i=0;i<n;i++){var ri=document.createElement('i');var dur=(0.75+Math.random()*(cls==='rain-h'?0.5:1.25));ri.style.left=Math.random()*100+'%';ri.style.height=rH+'px';ri.style.width=rW;ri.style.background=rBg;ri.style.animationDuration=dur+'s';ri.style.animationDelay=(-Math.random()*dur)+'s';ri.style.animationName='fall';ri.style.animationTimingFunction='linear';ri.style.animationIterationCount='infinite';rl.appendChild(ri)}
    fxEl.appendChild(rl);
  }
  if(cls==='snow-l'||cls==='snow-m'||cls==='snow-h'){
    var sl=document.createElement('div');sl.className='snow-layer';
    var n=cls==='snow-l'?15:(cls==='snow-m'?30:50);
    for(var i=0;i<n;i++){var si=document.createElement('i');var dur=(5+Math.random()*8);si.style.left=Math.random()*100+'%';si.style.animationDuration=dur+'s';si.style.animationDelay=(-Math.random()*dur)+'s';var sz=3+Math.random()*4;si.style.width=sz+'px';si.style.height=sz+'px';si.style.background='rgba(255,255,255,.7)';si.style.borderRadius='50%';si.style.position='absolute';si.style.animationName='snowfall';si.style.animationTimingFunction='linear';si.style.animationIterationCount='infinite';sl.appendChild(si)}
    fxEl.appendChild(sl);
  }
  if(cls==='fog'){var fo=document.createElement('div');fo.className='fog-overlay';fxEl.appendChild(fo)}
  if(cls==='dust'){var dl=document.createElement('div');dl.className='dust-layer';for(var i=0;i<20;i++){var di=document.createElement('i');di.style.top=Math.random()*100+'%';di.style.animationDuration=(2+Math.random()*4)+'s';di.style.animationDelay=Math.random()*3+'s';dl.appendChild(di)}fxEl.appendChild(dl)}
}

function drawChart(canvas){
  var dpr=window.devicePixelRatio||1,w=canvas.clientWidth,h=canvas.clientHeight;
  canvas.width=w*dpr;canvas.height=h*dpr;
  var ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  var temps=[8,7,6,5,5,6,8,11,14,17,19,21,22,22,21,20,18,16,14,12,11,10,9,8];
  var rains=[0,0,0,0,0,0,0,.5,1.2,2.5,3.1,2.0,.8,.3,0,0,.5,1.0,0,0,0,0,0,0];
  var tMin=3,tMax=25,rMax=4;
  var padL=18,padR=8,padT=6,padB=10,cw=w-padL-padR,ch=h-padT-padB;
  ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=.5;
  for(var i=0;i<=3;i++){var y=padT+ch*i/3;ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(w-padR,y);ctx.stroke()}
  ctx.fillStyle='rgba(255,255,255,.6)';ctx.font='bold 5px sans-serif';ctx.textAlign='right';
  for(var i=0;i<=3;i++){var y=padT+ch*i/3;var tv=Math.round(tMax-(tMax-tMin)*i/3);ctx.fillText(tv+'°',padL-2,y+2)}
  ctx.fillStyle='rgba(255,255,255,.5)';ctx.font='4px sans-serif';ctx.textAlign='center';
  [0,6,12,18,23].forEach(function(i){var x=padL+cw*i/23;ctx.fillText(i+'',x,h-1)});
  var barW=Math.max(1.5,cw/24*0.5);
  for(var i=0;i<24;i++){if(rains[i]>0){var x=padL+cw*i/23;var bh=(rains[i]/rMax)*ch*0.3;ctx.fillStyle='rgba(40,130,255,.6)';ctx.fillRect(x-barW/2,padT+ch-bh,barW,bh)}}
  ctx.beginPath();ctx.strokeStyle='rgba(255,210,80,1)';ctx.lineWidth=1.2;ctx.lineJoin='round';
  for(var i=0;i<24;i++){var x=padL+cw*i/23,y=padT+ch*(1-(temps[i]-tMin)/(tMax-tMin));if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}
  ctx.stroke();
  var nowH=12,nx=padL+cw*nowH/23,ny=padT+ch*(1-(temps[nowH]-tMin)/(tMax-tMin));
  ctx.beginPath();ctx.arc(nx,ny,2.5,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  ctx.beginPath();ctx.arc(nx,ny,4,0,Math.PI*2);ctx.fillStyle='rgba(255,210,80,.3)';ctx.fill();
}

var grid=document.getElementById('grid');
TYPES.forEach(function(t){
  var phone=document.createElement('div');phone.className='phone';
  var label=document.createElement('div');label.className='phone-label';label.textContent=t.label;
  var page=document.createElement('div');page.className='page';
  var bg=document.createElement('div');bg.className='bg '+t.id;
  var fx=document.createElement('div');fx.className='fx';
  makeFx(t.id,fx);

  var wrap=document.createElement('div');wrap.className='wrap';
  var h='';
  h+='<div class="city-bar">📍 本溪</div>';
  h+='<div class="now"><div class="temp">'+t.temp+'<sup>°</sup></div><div class="desc">'+t.desc+'</div><div class="feel">'+t.feel+'</div></div>';
  h+='<div class="chart-sec"><div class="ct"><span>今天 气温·降水</span><span style="opacity:.6">3.2mm</span></div>';
  h+='<div class="chart-box"><div class="chart-fx" id="cf-'+t.id+'"></div><canvas id="cv-'+t.id+'"></canvas></div></div>';
  h+='<div class="fc-title">7日预报</div><div class="fc">';
  FC.forEach(function(f){
    h+='<div class="fc-row"><div class="date">'+(f.label||f.wk)+'</div>';
    h+='<div class="winfo"><span class="icon">'+f.icon+'</span><span>'+f.w+'</span><span class="wind">'+f.wind+'</span></div>';
    h+='<div class="lo">'+f.lo+'</div><div class="hi">'+f.hi+'</div></div>';
  });
  h+='</div>';
  h+='<div class="upt">中央气象台 · 演示</div>';
  wrap.innerHTML=h;

  page.appendChild(bg);page.appendChild(fx);page.appendChild(wrap);
  phone.appendChild(label);phone.appendChild(page);
  grid.appendChild(phone);

  var cf=wrap.querySelector('.chart-fx');
  makeChartFx(t.id,cf);
  setTimeout(function(){
    var cv=document.getElementById('cv-'+t.id);
    if(cv)drawChart(cv);
  },150);
});
</script>
</body>
</html>
